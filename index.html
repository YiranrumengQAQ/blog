<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abyss - 纯粹防烧屏系统</title>
    <style>
        :root {
            --pc-panel-bg: rgba(10, 10, 12, 0.85);
            --pe-panel-bg: rgba(5, 5, 5, 0.9);
            --accent: #5e6ad2;
            --text-main: rgba(255, 255, 255, 0.8);
            --text-muted: rgba(255, 255, 255, 0.3);
            --global-brightness: 1; /* 全局亮度控制 */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body, html {
            width: 100%; height: 100%; background-color: #000; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
            color: var(--text-main); user-select: none;
        }

        /* 隐藏鼠标与UI的终极状态 */
        body.idle { cursor: none; }
        body.idle #pc-sidebar { transform: translateX(-100%); opacity: 0; }
        body.idle #pe-overlay { opacity: 0; pointer-events: none; backdrop-filter: blur(0px); }

        /* 核心渲染画布 */
        #render-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            filter: brightness(var(--global-brightness));
            z-index: 1;
        }

        /* ========================================= */
        /* PC 端专属 UI：左侧滑出式中控台 (Hover唤醒) */
        /* ========================================= */
        #pc-sidebar {
            position: absolute; left: 0; top: 0; height: 100%; width: 300px;
            background: var(--pc-panel-bg); backdrop-filter: blur(30px); border-right: 1px solid rgba(255,255,255,0.05);
            z-index: 100; transform: translateX(0); transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.5s;
            display: flex; flex-direction: column; padding: 40px 30px;
        }
        .pc-header { font-size: 24px; font-weight: 200; letter-spacing: 4px; margin-bottom: 40px; color: #fff; }
        .pc-menu-item {
            padding: 15px 0; font-size: 14px; letter-spacing: 2px; color: var(--text-muted);
            cursor: pointer; transition: all 0.3s ease; border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: space-between;
        }
        .pc-menu-item:hover { color: #fff; padding-left: 10px; }
        .pc-menu-item.active { color: var(--accent); border-bottom-color: var(--accent); }
        .pc-controls { margin-top: auto; }
        .slider-group { margin-bottom: 20px; }
        .slider-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
        input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        .btn-fullscreen {
            margin-top: 20px; padding: 12px; width: 100%; background: transparent; color: #fff;
            border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; cursor: pointer; transition: 0.3s;
        }
        .btn-fullscreen:hover { background: #fff; color: #000; }

        /* ========================================= */
        /* PE (移动) 端专属 UI：全屏沉浸式毛玻璃菜单 */
        /* ========================================= */
        #pe-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--pe-panel-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 100; display: none; flex-direction: column; padding: 10vw;
            transition: opacity 0.4s ease, backdrop-filter 0.4s ease;
        }
        .pe-header { font-size: 8vw; font-weight: 300; margin-bottom: 10vh; text-align: center; letter-spacing: 2px; }
        .pe-grid { display: grid; grid-template-columns: 1fr; gap: 4vw; flex-grow: 1; }
        .pe-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px; padding: 6vw; display: flex; flex-direction: column; justify-content: center;
            transition: background 0.2s;
        }
        .pe-card.active { border-color: var(--accent); background: rgba(94, 106, 210, 0.1); }
        .pe-card-title { font-size: 5vw; margin-bottom: 2vw; color: #fff; }
        .pe-card-desc { font-size: 3vw; color: var(--text-muted); line-height: 1.4; }
        .pe-footer-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 5vh; }
        .pe-btn { padding: 4vw 8vw; border-radius: 50px; background: rgba(255,255,255,0.1); color: #fff; border: none; font-size: 4vw; }

        /* 响应式断点严格分离 DOM 表现 */
        @media (max-width: 768px) {
            #pc-sidebar { display: none !important; }
            #pe-overlay { display: flex; opacity: 1; } /* 默认打开 */
        }
        @media (min-width: 769px) {
            #pe-overlay { display: none !important; }
        }
    </style>
</head>
<body>

    <canvas id="render-canvas"></canvas>

    <aside id="pc-sidebar">
        <div class="pc-header">ABYSS<br><span style="font-size: 12px; color: var(--text-muted);">AFK SYSTEM</span></div>
        <div class="pc-menu-item active" data-mode="zen">禅意游丝 (Zen Thread)<span>01</span></div>
        <div class="pc-menu-item" data-mode="quantum">量子涨落 (Quantum Dust)<span>02</span></div>
        <div class="pc-menu-item" data-mode="orbit">星轨时钟 (Orbit Time)<span>03</span></div>
        
        <div class="pc-controls">
            <div class="slider-group">
                <label>全局发光强度 (Brightness)</label>
                <input type="range" id="pc-bright" min="0.1" max="1" step="0.1" value="0.8">
            </div>
            <button class="btn-fullscreen" onclick="toggleFullScreen()">进入全屏模式</button>
        </div>
    </aside>

    <div id="pe-overlay">
        <div class="pe-header">选择护屏协议</div>
        <div class="pe-grid">
            <div class="pe-card active" data-mode="zen">
                <div class="pe-card-title">禅意游丝</div>
                <div class="pe-card-desc">极细单线条缓慢游走，像素级位移</div>
            </div>
            <div class="pe-card" data-mode="quantum">
                <div class="pe-card-title">量子涨落</div>
                <div class="pe-card-desc">全屏微光粒子随机生灭，极低平均亮度</div>
            </div>
            <div class="pe-card" data-mode="orbit">
                <div class="pe-card-title">星轨时钟</div>
                <div class="pe-card-desc">同心圆环代替数字，全域缓慢漂移</div>
            </div>
        </div>
        <div class="pe-footer-controls">
            <span style="font-size: 4vw; color: var(--text-muted);">轻触屏幕唤醒菜单</span>
            <button class="pe-btn" onclick="toggleFullScreen()">全屏</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 全局状态与 UI 管理
        // ==========================================
        let idleTimer;
        let currentMode = 'zen';
        let animationId;
        const canvas = document.getElementById('render-canvas');
        const ctx = canvas.getContext('2d', { alpha: false }); // alpha: false 强制黑色背景，提升性能

        // 调整 Canvas 尺寸
        function resize() {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = window.innerHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        window.addEventListener('resize', resize);
        resize();

        // 闲置检测 (隐藏 UI)
        function resetIdle() {
            document.body.classList.remove('idle');
            clearTimeout(idleTimer);
            // 鼠标移动或点击后，3.5秒无操作进入纯黑挂机模式
            idleTimer = setTimeout(() => {
                document.body.classList.add('idle');
            }, 3500); 
        }
        ['mousemove', 'touchstart', 'click'].forEach(evt => window.addEventListener(evt, resetIdle));
        resetIdle();

        // 全屏 API
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        // 模式切换绑定 (双端共用逻辑)
        function switchMode(mode) {
            currentMode = mode;
            // 更新 PC 状态
            document.querySelectorAll('.pc-menu-item').forEach(el => el.classList.remove('active'));
            const pcBtn = document.querySelector(`.pc-menu-item[data-mode="${mode}"]`);
            if(pcBtn) pcBtn.classList.add('active');
            
            // 更新 PE 状态
            document.querySelectorAll('.pe-card').forEach(el => el.classList.remove('active'));
            const peBtn = document.querySelector(`.pe-card[data-mode="${mode}"]`);
            if(peBtn) peBtn.classList.add('active');

            // 切换模式时清空画布并重启引擎
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
            cancelAnimationFrame(animationId);
            startEngine();
        }

        document.querySelectorAll('.pc-menu-item, .pe-card').forEach(el => {
            el.addEventListener('click', (e) => switchMode(e.currentTarget.dataset.mode));
        });

        // 亮度控制
        document.getElementById('pc-bright').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--global-brightness', e.target.value);
        });

        // ==========================================
        // 2. 核心渲染引擎：三大防烧屏算法
        // ==========================================
        
        // 模式 A: 禅意游丝 (Zen Thread)
        let zenAngle = 0;
        let zenX, zenY;
        function renderZen() {
            // 使用极低透明度的黑色覆盖，形成柔和拖尾
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            if(!zenX) { zenX = window.innerWidth/2; zenY = window.innerHeight/2; }
            
            // 极缓的李萨如曲线轨迹计算
            zenX = window.innerWidth/2 + Math.sin(zenAngle * 0.5) * (window.innerWidth * 0.4);
            zenY = window.innerHeight/2 + Math.cos(zenAngle * 0.7) * (window.innerHeight * 0.4);
            zenAngle += 0.005;

            ctx.beginPath();
            ctx.arc(zenX, zenY, 2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(150, 180, 255, 0.8)';
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(150, 180, 255, 0.5)';
            ctx.fill();
            ctx.shadowBlur = 0; // 重置阴影防止性能泄漏
        }

        // 模式 B: 量子涨落 (Quantum Dust)
        let dusts = [];
        function renderQuantum() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; // 较快清除拖尾
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            // 动态补充粒子
            if(dusts.length < 50 && Math.random() > 0.5) {
                dusts.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    life: 0,
                    maxLife: Math.random() * 100 + 50,
                    size: Math.random() * 1.5 + 0.5
                });
            }

            for(let i = dusts.length - 1; i >= 0; i--) {
                let p = dusts[i];
                p.life++;
                let opacity = Math.sin((p.life / p.maxLife) * Math.PI) * 0.6; // 呼吸渐隐渐现算法
                
                ctx.beginPath();
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();

                if(p.life >= p.maxLife) dusts.splice(i, 1);
            }
        }

        // 模式 C: 星轨时钟 (Orbit Time)
        let orbitOffsetX = 0, orbitOffsetY = 0;
        let orbitAngle = 0;
        function renderOrbit() {
            ctx.fillStyle = '#000'; // 完全重绘，不留拖尾
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            const now = new Date();
            const h = now.getHours() % 12 + now.getMinutes() / 60;
            const m = now.getMinutes() + now.getSeconds() / 60;
            const s = now.getSeconds() + now.getMilliseconds() / 1000;

            // 让整个时钟系在屏幕内极其缓慢地公转
            orbitOffsetX = Math.sin(orbitAngle * 0.3) * (window.innerWidth * 0.2);
            orbitOffsetY = Math.cos(orbitAngle * 0.4) * (window.innerHeight * 0.2);
            orbitAngle += 0.002;

            const cx = window.innerWidth / 2 + orbitOffsetX;
            const cy = window.innerHeight / 2 + orbitOffsetY;

            const drawArc = (radius, value, max, color, lineWidth) => {
                ctx.beginPath();
                ctx.arc(cx, cy, radius, -Math.PI / 2, (-Math.PI / 2) + (value / max) * Math.PI * 2);
                ctx.strokeStyle = color;
                ctx.lineWidth = lineWidth;
                ctx.lineCap = 'round';
                ctx.stroke();
            };

            // 秒、分、时同心圆
            drawArc(60, s, 60, 'rgba(255, 255, 255, 0.2)', 2);
            drawArc(80, m, 60, 'rgba(255, 255, 255, 0.4)', 4);
            drawArc(100, h, 12, 'rgba(200, 220, 255, 0.8)', 6);
        }

        // 主循环分配器
        function startEngine() {
            if (currentMode === 'zen') renderZen();
            else if (currentMode === 'quantum') renderQuantum();
            else if (currentMode === 'orbit') renderOrbit();
            
            animationId = requestAnimationFrame(startEngine);
        }

        // 启动！
        startEngine();
    </script>
</body>
</html>
