<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pro版 动态防烧屏挂机系统</title>
    <style>
        :root {
            --ui-bg: rgba(255, 255, 255, 0.1);
            --ui-border: rgba(255, 255, 255, 0.2);
            --ui-text: rgba(255, 255, 255, 0.8);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; /* 极致黑底色 */
            overflow: hidden;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 隐藏鼠标指针的魔法 */
        body.idle { cursor: none; }
        
        #app { width: 100%; height: 100%; position: relative; }

        /* --- 绝美毛玻璃控制台 --- */
        #ui-layer {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 999; display: flex; gap: 15px;
            background: var(--ui-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 12px 24px; border-radius: 30px; border: 1px solid var(--ui-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s ease;
        }

        body.idle #ui-layer {
            opacity: 0; transform: translate(-50%, 20px); pointer-events: none;
        }

        button {
            background: transparent; border: none; color: var(--ui-text);
            font-size: 15px; font-weight: 500; cursor: pointer;
            padding: 8px 16px; border-radius: 20px; transition: all 0.3s ease;
        }
        button:hover { background: rgba(255, 255, 255, 0.2); color: #fff; }
        button.active { background: rgba(255, 255, 255, 0.9); color: #000; }

        /* --- 模式容器 --- */
        .mode-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; opacity: 0; transition: opacity 0.5s ease;
        }
        .mode-container.active { display: block; opacity: 1; }

        /* 模式1: 极致纯黑 */
        #mode-black { background: #000; }

        /* 模式2: 霓虹时钟 */
        #neon-clock-text {
            position: absolute; font-size: 10vw; font-weight: 200; color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.5), 0 0 20px rgba(0,255,255,0.5), 0 0 40px rgba(0,255,255,0.3);
            transition: top 3s cubic-bezier(0.4, 0, 0.2, 1), left 3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
        }

        /* 模式3: 极光呼吸 */
        .aurora-orb {
            position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.6;
            animation: float 20s infinite alternate ease-in-out;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 150px) scale(1.5); }
        }

        /* 模式4: 经典 DVD */
        #dvd-logo {
            position: absolute; width: 180px; height: 90px;
            display: flex; justify-content: center; align-items: center;
            font-size: 32px; font-weight: 900; color: #fff; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        /* 模式5: 深邃星空 */
        #starfield { width: 100%; height: 100%; display: block; }

    </style>
</head>
<body>

    <div id="app">
        <div id="mode-black" class="mode-container"></div>
        
        <div id="mode-clock" class="mode-container">
            <div id="neon-clock-text">00:00:00</div>
        </div>
        
        <div id="mode-aurora" class="mode-container">
            </div>
        
        <div id="mode-dvd" class="mode-container">
            <div id="dvd-logo">SCREENSAVER</div>
        </div>
        
        <div id="mode-stars" class="mode-container">
            <canvas id="starfield"></canvas>
        </div>

        <div id="ui-layer">
            <button class="mode-btn" data-mode="black">极致纯黑</button>
            <button class="mode-btn" data-mode="clock">霓虹时钟</button>
            <button class="mode-btn" data-mode="aurora">极光呼吸</button>
            <button class="mode-btn" data-mode="dvd">经典弹跳</button>
            <button class="mode-btn" data-mode="stars">深邃星空</button>
            <button id="btn-fs">⛶ 全屏</button>
        </div>
    </div>

    <script>
        // === 1. 核心状态与防呆逻辑 ===
        let idleTimer;
        const body = document.body;
        
        function resetIdle() {
            body.classList.remove('idle');
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => body.classList.add('idle'), 3500); // 3.5秒无动作隐藏
        }
        ['mousemove', 'touchstart', 'keydown', 'click'].forEach(evt => 
            window.addEventListener(evt, resetIdle)
        );
        resetIdle();

        // 全屏逻辑
        document.getElementById('btn-fs').addEventListener('click', () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        });

        // === 2. 模式切换系统 ===
        const containers = document.querySelectorAll('.mode-container');
        const btns = document.querySelectorAll('.mode-btn');
        let currentMode = 'stars'; // 默认模式

        function setMode(modeId) {
            currentMode = modeId;
            containers.forEach(c => c.classList.remove('active'));
            btns.forEach(b => b.classList.remove('active'));
            
            document.getElementById(`mode-${modeId}`).classList.add('active');
            document.querySelector(`[data-mode="${modeId}"]`).classList.add('active');
        }

        btns.forEach(btn => {
            btn.addEventListener('click', (e) => setMode(e.target.dataset.mode));
        });

        // === 3. 各模式引擎 ===

        // 【模式2】霓虹时钟
        const clockEl = document.getElementById('neon-clock-text');
        function tickClock() {
            clockEl.innerText = new Date().toLocaleTimeString('zh-CN', { hour12: false });
        }
        function moveClock() {
            if(currentMode !== 'clock') return;
            const maxX = window.innerWidth - clockEl.clientWidth - 50;
            const maxY = window.innerHeight - clockEl.clientHeight - 50;
            clockEl.style.left = Math.max(20, Math.random() * maxX) + 'px';
            clockEl.style.top = Math.max(20, Math.random() * maxY) + 'px';
            // 随机霓虹颜色
            const hues = [0, 60, 120, 180, 280, 320];
            const hue = hues[Math.floor(Math.random() * hues.length)];
            clockEl.style.textShadow = `0 0 10px hsla(${hue},100%,70%,0.5), 0 0 30px hsla(${hue},100%,50%,0.8)`;
        }
        setInterval(tickClock, 1000);
        setInterval(moveClock, 6000); // 每6秒移动一次

        // 【模式3】极光呼吸
        const auroraBg = document.getElementById('mode-aurora');
        const colors = ['#0f2027', '#203a43', '#2c5364', '#1a2a6c', '#b21f1f', '#fdbb2d', '#4b6cb7', '#182848'];
        for(let i=0; i<4; i++) {
            let orb = document.createElement('div');
            orb.className = 'aurora-orb';
            orb.style.width = Math.random() * 400 + 300 + 'px';
            orb.style.height = orb.style.width;
            orb.style.background = colors[Math.floor(Math.random() * colors.length)];
            orb.style.left = Math.random() * 100 + '%';
            orb.style.top = Math.random() * 100 + '%';
            orb.style.animationDelay = `-${Math.random() * 10}s`;
            auroraBg.appendChild(orb);
        }

        // 【模式4】经典 DVD
        const dvd = document.getElementById('dvd-logo');
        let x=100, y=100, vx=2.5, vy=2.5;
        function animateDvd() {
            if (currentMode === 'dvd') {
                let rect = dvd.getBoundingClientRect();
                if (x + rect.width >= window.innerWidth || x <= 0) {
                    vx = -vx;
                    dvd.style.background = `hsl(${Math.random()*360}, 80%, 50%)`;
                }
                if (y + rect.height >= window.innerHeight || y <= 0) {
                    vy = -vy;
                    dvd.style.background = `hsl(${Math.random()*360}, 80%, 50%)`;
                }
                x += vx; y += vy;
                dvd.style.transform = `translate(${x}px, ${y}px)`;
            }
            requestAnimationFrame(animateDvd);
        }
        dvd.style.background = '#e91e63'; // 初始颜色

        // 【模式5】深邃星空 (Canvas 粒子引擎)
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initStars();
        }
        function initStars() {
            stars = [];
            for(let i=0; i<150; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.5,
                    speed: Math.random() * 0.5 + 0.1
                });
            }
        }
        function drawStars() {
            if(currentMode === 'stars') {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                stars.forEach(star => {
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                    ctx.fill();
                    star.y += star.speed; // 星星向下坠落
                    if(star.y > canvas.height) {
                        star.y = 0;
                        star.x = Math.random() * canvas.width;
                    }
                });
            }
            requestAnimationFrame(drawStars);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 启动引擎
        setMode('black'); // 默认打开纯黑模式
        tickClock(); moveClock();
        animateDvd();
        drawStars();
        
    </script>
</body>
</html>
